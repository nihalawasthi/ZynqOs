name: Build WASM + Frontend

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS deps
        run: npm install --frozen-lockfile

      - name: Cache cargo (optional)
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain and target
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          target: wasm32-wasip1

      - name: Install wasm-pack
        if: matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest'
        run: |
          cargo install wasm-pack --force

      - name: Build WASM (Linux .sh)
        if: matrix.os == 'ubuntu-latest'
        run: |
          if [ -f ./scripts/build-wasm.sh ]; then
            bash ./scripts/build-wasm.sh
          else
            echo "No ./scripts/build-wasm.sh found — skipping wasm build on linux"
          fi

      - name: Build WASM (Windows .ps1)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path './scripts/build-wasi.ps1') {
            pwsh -NoProfile -ExecutionPolicy Bypass ./scripts/build-wasi.ps1
          } else {
            Write-Host "No ./scripts/build-wasi.ps1 found — skipping wasm build on windows"
          }

      - name: Build frontend
        run: npm run build

      - name: Upload artifact (frontend build)
        if: matrix.os == 'ubuntu-latest' && success()
        uses: actions/upload-artifact@v4
        with:
          name: microos-dist
          path: dist

      - name: Upload WASM artifacts (Linux only)
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: wasm-artifacts
          path: |
            public/apps/wasm/
            apps/**/target/**/release/*.wasm
      - name: Check Vercel secrets present
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        run: |
          MISSING=0
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "VERCEL_TOKEN is missing"
            MISSING=1
          else
            echo "VERCEL_TOKEN present"
          fi
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "VERCEL_ORG_ID is missing"
            MISSING=1
          else
            echo "VERCEL_ORG_ID present"
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "VERCEL_PROJECT_ID is missing"
            MISSING=1
          else
            echo "VERCEL_PROJECT_ID present"
          fi
          if [ "$MISSING" -ne 0 ]; then
            echo "One or more Vercel secrets are missing. Set VERCEL_TOKEN, VERCEL_ORG_ID and VERCEL_PROJECT_ID in repo secrets.";
            exit 1
          fi

      - name: Prepare Vercel prebuilt output (Linux only)
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        run: |
          echo "Preparing .vercel/output from ./dist"
          rm -rf .vercel/output || true
          mkdir -p .vercel/output/static
          cp -a dist/. .vercel/output/static/
          # Also prepare inside dist so the deploy action (which runs in 'dist') can find it
          rm -rf dist/.vercel/output || true
          mkdir -p dist/.vercel/output/static
          cp -a dist/. dist/.vercel/output/static/
          cat > .vercel/output/config.json <<'JSON'
          {"version":3}
          JSON
          cat > dist/.vercel/output/config.json <<'JSON'
          {"version":3}
          JSON

      - name: Deploy prebuilt `dist/` to Vercel (Linux only)
        if: matrix.os == 'ubuntu-latest' && github.ref == 'refs/heads/main'
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-args: '--prod --confirm --prebuilt'
          working-directory: 'dist'
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
