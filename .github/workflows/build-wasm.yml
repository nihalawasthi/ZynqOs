name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    name: Lint, Format, Test, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install JS deps
        run: npm ci

      - name: Detect changed files
        id: changed
        uses: tj-actions/changed-files@v45

      - name: Lint changed files
        shell: bash
        run: |
          FILES="${{ steps.changed.outputs.all_changed_files }}"
          LINT_FILES=$(echo "$FILES" | tr ' ' '\n' | grep -E '\.(ts|tsx|js|jsx|mjs|cjs)$' || true)
          if [ -z "$LINT_FILES" ]; then
            echo "No JS/TS files changed."
            exit 0
          fi
          echo "$LINT_FILES" | tr '\n' ' '
          npx eslint $LINT_FILES

      - name: Format check changed files
        shell: bash
        run: |
          FILES="${{ steps.changed.outputs.all_changed_files }}"
          FORMAT_FILES=$(echo "$FILES" | tr ' ' '\n' | grep -E '\.(md|json|ya?ml|css|html|ts|tsx|js|jsx|mjs|cjs)$' || true)
          if [ -z "$FORMAT_FILES" ]; then
            echo "No Prettier-supported files changed."
            exit 0
          fi
          echo "$FORMAT_FILES" | tr '\n' ' '
          npx prettier --check $FORMAT_FILES

      - name: Tests
        run: npm run test

      - name: Build frontend
        run: npm run build
