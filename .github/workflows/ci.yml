name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cache cargo (optional)
        uses: actions/cache@v4
        id: cargo-cache
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install wasm-pack
        run: cargo install wasm-pack --force

      - name: Build WASM pack (if present)
        run: |
          if [ -f ./scripts/build-wasm.sh ]; then
            bash ./scripts/build-wasm.sh
          else
            echo "No wasm build script found; skipping"
          fi

      - name: Upload artifact (frontend build)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: microos-dist
          path: dist
