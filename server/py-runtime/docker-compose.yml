version: "3.9"

services:
  zynqos-python:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATA_ROOT: /data/users
      API_KEY: ${API_KEY:-}
    volumes:
      - zynqos-data:/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M

volumes:
  zynqos-data:
